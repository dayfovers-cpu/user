<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB 2024 - Cek Status Penerimaan</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            padding: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-result {
            margin-top: 2rem;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        .status-lolos {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            color: #155724;
            border: 2px solid #56ab2f;
        }

        .status-tidak-lolos {
            background: linear-gradient(135deg, #dc3545, #f8d7da);
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .status-loading {
            background: linear-gradient(135deg, #ffc107, #fff3cd);
            color: #856404;
            border: 2px solid #ffc107;
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .status-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .status-detail {
            font-size: 1rem;
            opacity: 0.9;
        }

        .info-banner {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            color: #856404;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
            
            .logo h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-graduation-cap" style="font-size: 2rem; color: #667eea;"></i>
                <h1>SPMB 2024</h1>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="info-banner">
                <i class="fas fa-info-circle"></i>
                Masukkan Nomor Pendaftaran SPMB 2024 Anda untuk mengecek status penerimaan
            </div>
            
            <div class="card" id="cekCard">
                <div class="card-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h2>Cek Status Penerimaan</h2>
                <p>Masukkan nomor pendaftaran Anda</p>
                
<form id="cekForm">
    <div class="form-group">
        <label>
            <i class="fas fa-id-card"></i> Nomor Pendaftaran
        </label>
        <input type="text" class="form-control" id="noPendaftaran" 
               placeholder="Contoh: SPMB0012345678" required>
    </div>

    <div class="form-group">
        <label>
            <i class="fas fa-user"></i> Nama Lengkap
        </label>
        <input type="text" class="form-control" id="namaSiswa" 
               placeholder="Masukkan nama sesuai pendaftaran" required>
    </div>

    <button type="submit" class="btn">
        <i class="fas fa-check-circle"></i> Cek Status
    </button>
</form>
            </div>

            <div class="card status-result" id="resultContainer">
                <div class="spinner" id="spinner"></div>
                <div class="status-icon" id="statusIcon"></div>
                <div class="status-title" id="statusTitle"></div>
                <div class="status-detail" id="statusDetail"></div>
                <button class="btn" id="cekLagiBtn" style="display: none;">
                    <i class="fas fa-redo"></i> Cek Lagi
                </button>
            </div>
        </div>
    </main>

<script>
const form = document.getElementById('cekForm');
const resultContainer = document.getElementById('resultContainer');
const cekCard = document.getElementById('cekCard');
const noPendaftaranInput = document.getElementById('noPendaftaran');
const namaInput = document.getElementById('namaSiswa');

const spinner = document.getElementById('spinner');
const statusIcon = document.getElementById('statusIcon');
const statusTitle = document.getElementById('statusTitle');
const statusDetail = document.getElementById('statusDetail');
const cekLagiBtn = document.getElementById('cekLagiBtn');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    const noPendaftaran = noPendaftaranInput.value.trim().toUpperCase();
    const nama = namaInput.value.trim();

    if (!noPendaftaran || !nama) {
        alert('Isi semua data!');
        return;
    }

    showLoading();

    fetch('cek.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'no=' + noPendaftaran + '&nama=' + nama
    })
    .then(res => res.json())
    .then(data => {
        showResult(data);
    })
    .catch(() => {
        showResult({
            status: 'tidak-ditemukan',
            pesan: 'Server error'
        });
    });
});

cekLagiBtn.addEventListener('click', function() {
    resetForm();
});

function showLoading() {
    cekCard.style.display = 'none';
    resultContainer.style.display = 'block';
    resultContainer.className = 'card status-result status-loading';
    statusIcon.innerHTML = '';
    statusTitle.textContent = 'Memeriksa status...';
    statusDetail.textContent = 'Mohon tunggu sebentar';
    spinner.style.display = 'block';
    cekLagiBtn.style.display = 'none';
}

function showResult(data) {
    spinner.style.display = 'none';
    
    if (data.status === 'lolos') {
        resultContainer.className = 'card status-result status-lolos';
        statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
        statusTitle.textContent = 'SELAMAT! ANDA LOLOS';
        statusDetail.innerHTML = `
            <strong>${data.nama}</strong><br>
            <strong>${data.prodi}</strong><br>
            ${data.universitas}<br>
            Nilai: ${data.nilai} | ${data.tanggal}
        `;
    } else if (data.status === 'tidak-lolos') {
        resultContainer.className = 'card status-result status-tidak-lolos';
        statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
        statusTitle.textContent = 'MOHON MAAF';
        statusDetail.innerHTML = `
            <strong>${data.nama}</strong><br>
            Belum diterima di ${data.prodi}<br>
            ${data.universitas}<br>
            Nilai: ${data.nilai}
        `;
    } else {
        resultContainer.className = 'card status-result status-tidak-lolos';
        statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        statusTitle.textContent = 'DATA TIDAK DITEMUKAN';
        statusDetail.textContent = data.pesan;
    }
    
    cekLagiBtn.style.display = 'block';
}

function resetForm() {
    resultContainer.style.display = 'none';
    cekCard.style.display = 'block';
    noPendaftaranInput.value = '';
    namaInput.value = '';
}

// Auto focus
noPendaftaranInput.focus();
</script>
</body>
</html>
